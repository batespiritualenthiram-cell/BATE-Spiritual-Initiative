<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Offering - BATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Noto+Sans+Devanagari:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background: var(--bg-dark);
        }

        /* ====== MAIN PAYMENT SECTION (above fold) ====== */
        .payment-main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        .payment-card {
            max-width: 480px;
            width: 100%;
            padding: 40px 35px;
            text-align: center;
            position: relative;
        }

        /* ====== 5-MIN COUNTDOWN TIMER ====== */
        .timer-wrapper {
            margin: 25px 0;
            position: relative;
        }

        .timer-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .timer-display {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.3s ease;
            line-height: 1;
        }

        .timer-display.urgent {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            -webkit-background-clip: text;
            background-clip: text;
            animation: timerUrgentPulse 0.5s ease-in-out infinite;
        }

        @keyframes timerUrgentPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .timer-bar-wrapper {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #10b981, #f59e0b, #ef4444);
            border-radius: 2px;
            transform-origin: left;
            transition: width 1s linear;
        }

        /* ====== STATUS INDICATOR ====== */
        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            margin: 20px 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            animation: statusPulse 1.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* ====== QR SECTION ====== */
        .qr-section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .qr-frame {
            background: white;
            border-radius: 12px;
            padding: 10px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .qr-frame img {
            width: 170px;
            height: 170px;
            display: block;
        }

        .upi-pay-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 17px;
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.8), rgba(90, 20, 180, 0.9));
            color: white;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            margin-bottom: 15px;
            border: 1px solid rgba(138, 43, 226, 0.4);
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(138, 43, 226, 0.3);
        }

        .upi-pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(138, 43, 226, 0.5);
        }

        .upi-id-text {
            font-size: 0.85rem;
            color: var(--accent-gold);
            letter-spacing: 1.5px;
            margin-top: 8px;
        }

        .desktop-only { display: none; }
        @media (min-width: 768px) { .desktop-only { display: block; } }

        /* ====== VERIFY BUTTON (inline, small) ====== */
        .verify-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            margin-top: 14px;
            background: rgba(16, 185, 129, 0.1);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(16, 185, 129, 0.4);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 700;
            color: #10b981;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            animation: verifyGlow 2.5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .verify-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(16,185,129,0.07), transparent);
            animation: verifyBtnSweep 2.5s ease-in-out infinite;
        }
        @keyframes verifyBtnSweep {
            0%   { transform: translateX(-100%) skewX(-10deg); }
            100% { transform: translateX(250%) skewX(-10deg); }
        }

        @keyframes verifyGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(16,185,129,0.25), 0 0 30px rgba(16,185,129,0.1); }
            50%       { box-shadow: 0 0 20px rgba(16,185,129,0.5), 0 0 60px rgba(16,185,129,0.2); }
        }

        .verify-btn:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.75);
            transform: translateY(-1px);
        }

        .verify-btn.loading {
            pointer-events: none;
            opacity: 0.6;
        }

        .verify-btn.revealed {
            animation: verifyGlowRevealed 1s ease-in-out infinite;
            border-color: #10b981;
        }

        @keyframes verifyGlowRevealed {
            0%, 100% { box-shadow: 0 0 25px rgba(16,185,129,0.7), 0 0 60px rgba(16,185,129,0.3); transform: scale(1); }
            50%       { box-shadow: 0 0 40px rgba(16,185,129,1), 0 0 90px rgba(16,185,129,0.5); transform: scale(1.02); }
        }

        /* ====== PAYMENT AMOUNT DISPLAY ====== */
        .amount-display {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-shadow: 0 0 20px rgba(255,215,0,0.3);
            margin: 10px 0;
        }
    </style>
</head>
<body class="bg-dark">
    <canvas id="star-canvas"></canvas>
    <div class="fixed-bg"></div>

    <!-- ===================== MAIN SECTION (ABOVE FOLD) ===================== -->
    <section class="payment-main">
        <div class="payment-card glass-card">

            <div style="font-size: 3rem; color: var(--accent-purple-light); margin-bottom: 15px;">
                <i class="fas fa-om"></i>
            </div>

            <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 5px;">Spiritual Offering</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 5px;">Scan the QR or tap the button below to complete your sacred exchange</p>

            <div class="amount-display">₹10</div>

            <!-- 5-Minute Countdown Timer -->
            <div class="timer-wrapper">
                <p class="timer-label">Time Remaining</p>
                <div class="timer-display" id="timer-display">05:00</div>
                <div class="timer-bar-wrapper">
                    <div class="timer-bar" id="timer-bar"></div>
                </div>
            </div>

            <!-- Status -->
            <div class="status-indicator" id="status-indicator">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Awaiting your payment...</span>
            </div>

            <!-- Mobile UPI Button -->
            <a href="upi://pay?pa=vssanjay11@ptyes&pn=Sanjay&am=10&cu=INR&tn=Enthiram Offering"
               class="upi-pay-btn" id="upi-mobile-btn">
                <i class="fas fa-mobile-alt"></i>
                Pay ₹10 with UPI App
            </a>

            <!-- Desktop QR -->
            <div class="qr-section desktop-only">
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px;">
                    <i class="fas fa-qrcode" style="margin-right:6px;"></i>Desktop? Scan to Pay
                </p>
                <div class="qr-frame">
                    <img id="qr-image" src="" alt="UPI QR Code">
                </div>
                <p class="upi-id-text">vssanjay11@ptyes</p>
            </div>

            <!-- Verify Button (inline, below QR) -->
            <button class="verify-btn" id="secret-btn">
                <i class="fas fa-cloud-arrow-down"></i>
                Click Here to Download
            </button>

            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 12px; line-height: 1.6;">
                <i class="fas fa-lock" style="margin-right:5px;"></i>
                Your offering is being monitored in real time. Please do not close this page.
            </p>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const numericId = urlParams.get('id');

            // Generate QR
            const upiString = "upi://pay?pa=vssanjay11@ptyes&pn=Sanjay&am=10&cu=INR&tn=Enthiram Offering";
            const qrImage = document.getElementById('qr-image');
            if (qrImage) {
                qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=190x190&data=${encodeURIComponent(upiString)}&color=000000&bgcolor=ffffff`;
            }

            if (!numericId) {
                window.location.href = '/';
                return;
            }

            // ===== 5-MINUTE COUNTDOWN =====
            const TOTAL_SECONDS = 5 * 60;
            let timeLeft = TOTAL_SECONDS;
            const timerEl = document.getElementById('timer-display');
            const timerBar = document.getElementById('timer-bar');

            function updateTimer() {
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                timerBar.style.width = `${(timeLeft / TOTAL_SECONDS) * 100}%`;

                if (timeLeft <= 60) {
                    timerEl.classList.add('urgent');
                }
            }

            const timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    clearInterval(pollInterval);
                    window.location.href = '/failure.html?reason=timeout';
                }
            }, 1000);

            updateTimer();

            // ===== BACKGROUND POLLING (every 5 seconds) =====
            let alreadyTriggered = false;

            async function checkPaymentStatus() {
                if (alreadyTriggered) return;
                try {
                    const res = await fetch(`/api/check-status/${numericId}`);
                    const data = await res.json();
                    if (data.verified && !alreadyTriggered) {
                        alreadyTriggered = true;
                        clearInterval(timerInterval);
                        clearInterval(pollInterval);
                        onPaymentVerified();
                    }
                } catch (e) {
                    // Silent fail — keep polling
                }
            }

            const pollInterval = setInterval(checkPaymentStatus, 5000);
            checkPaymentStatus(); // immediate first check

            // ===== ON PAYMENT VERIFIED (highlight the inline button) =====
            function onPaymentVerified() {
                const dot = document.getElementById('status-dot');
                const statusText = document.getElementById('status-text');
                dot.style.background = '#10b981';
                dot.style.animation = 'none';
                statusText.textContent = '✅ Payment Confirmed! Click the button below to unlock.';

                // Make the inline button glow dramatically
                document.getElementById('secret-btn').classList.add('revealed');
            }

            // ===== SECRET BUTTON CLICK =====
            const secretBtn = document.getElementById('secret-btn');
            secretBtn.addEventListener('click', async () => {
                if (alreadyTriggered) {
                    // Already verified via polling — just redirect
                    window.location.href = `/success.html?id=${numericId}`;
                    return;
                }

                // Try to verify
                secretBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verifying...';
                secretBtn.classList.add('loading');

                try {
                    const res = await fetch('/api/verify-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ numericId })
                    });
                    const data = await res.json();

                    if (data.success) {
                        alreadyTriggered = true;
                        clearInterval(timerInterval);
                        clearInterval(pollInterval);

                        // Quick success flash on button
                        secretBtn.innerHTML = '<i class="fas fa-check-circle"></i> Unlocked!';
                        secretBtn.style.background = 'rgba(16, 185, 129, 0.3)';
                        secretBtn.style.color = '#ffffff';

                        setTimeout(() => {
                            window.location.href = `/success.html?id=${numericId}`;
                        }, 700);
                    } else {
                        secretBtn.innerHTML = '<i class="fas fa-cloud-arrow-down"></i> Click Here to Download';
                        secretBtn.classList.remove('loading');
                    }
                } catch (err) {
                    secretBtn.innerHTML = '<i class="fas fa-cloud-arrow-down"></i> Click Here to Download';
                    secretBtn.classList.remove('loading');
                }
            });
        });

        // ===== STAR CANVAS =====
        (function () {
            const canvas = document.getElementById('star-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            const stars = Array.from({ length: 180 }, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                r: Math.random() * 1.2 + 0.2, o: Math.random() * 0.5 + 0.1,
                sp: Math.random() * 0.01 + 0.003, ph: Math.random() * Math.PI * 2
            }));
            function draw(t) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    const op = s.o * (0.6 + 0.4 * Math.sin(t * s.sp + s.ph));
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${op})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            requestAnimationFrame(draw);
            window.addEventListener('resize', resize);
        })();
    </script>
</body>
</html>
