<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offering Accepted - BATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        body {
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 40%, rgba(16,185,129,0.18), transparent 65%), var(--bg-dark);
            animation: successBg 6s ease-in-out infinite alternate;
        }

        @keyframes successBg {
            from { background: radial-gradient(ellipse at 50% 40%, rgba(16,185,129,0.12), transparent 65%), var(--bg-dark); }
            to   { background: radial-gradient(ellipse at 50% 40%, rgba(16,185,129,0.25), transparent 65%), var(--bg-dark); }
        }

        .success-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        .success-card {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 50px 40px;
            animation: cardBounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            border-color: rgba(16,185,129,0.4) !important;
            box-shadow: 0 0 60px rgba(16,185,129,0.2), 0 0 120px rgba(16,185,129,0.08) !important;
        }

        @keyframes cardBounceIn {
            0%   { opacity: 0; transform: scale(0.7); }
            60%  { transform: scale(1.05); }
            80%  { transform: scale(0.97); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Animated checkmark icon */
        .success-icon-wrapper {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16,185,129,0.25), rgba(16,185,129,0.05), transparent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: auraExpand 3s ease-in-out infinite;
        }

        @keyframes auraExpand {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5), 0 0 30px rgba(16,185,129,0.3); }
            50%       { box-shadow: 0 0 0 25px rgba(16,185,129,0), 0 0 60px rgba(16,185,129,0.4); }
        }

        .success-icon {
            font-size: 5.5rem;
            color: #10b981;
            animation: iconPop 0.6s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes iconPop {
            0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
            70%  { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .success-title {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--accent-gold);
            text-shadow: 0 0 30px rgba(255,215,0,0.4);
            margin-bottom: 12px;
            animation: fadeSlideUp 0.6s 0.5s both;
        }

        .success-subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 30px;
            animation: fadeSlideUp 0.6s 0.7s both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Countdown ring */
        .countdown-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: fadeSlideUp 0.6s 0.9s both;
        }

        .ring-container {
            position: relative;
            width: 90px;
            height: 90px;
        }

        .ring-container svg {
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: rgba(255,255,255,0.08);
            stroke-width: 6;
        }

        .ring-progress {
            fill: none;
            stroke: #10b981;
            stroke-width: 6;
            stroke-dasharray: 226;
            stroke-dashoffset: 0;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .ring-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 800;
            color: #10b981;
        }

        .countdown-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Sweep animation inside card */
        @keyframes sweep {
            0% { transform: translateX(-100%) skewX(-20deg); }
            100% { transform: translateX(250%) skewX(-20deg); }
        }

        .sweep-shimmer {
            position: absolute;
            top: 0; left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(16,185,129,0.06), transparent);
            pointer-events: none;
            animation: sweep 2.5s ease-in-out infinite;
            border-radius: inherit;
        }

        /* Balloon */
        .balloon {
            position: fixed;
            border-radius: 50%;
            opacity: 0.85;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes floatUp {
            0%   { transform: translateY(0) rotate(0deg); opacity: 0.85; }
            100% { transform: translateY(-120vh) rotate(25deg); opacity: 0; }
        }
    </style>
</head>
<body class="bg-dark">
    <canvas id="star-canvas"></canvas>
    <div class="fixed-bg"></div>

    <div id="balloon-layer" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:998;"></div>

    <div class="success-container">
        <div class="success-card glass-card" style="position:relative; overflow:hidden;">
            <div class="sweep-shimmer"></div>

            <!-- Icon -->
            <div class="success-icon-wrapper">
                <i class="fas fa-heart-circle-check success-icon"></i>
            </div>

            <!-- Title -->
            <h1 class="success-title">Gratitude Received!</h1>
            <p class="success-subtitle">
                Your spiritual offering has been accepted by the cosmos.<br>
                Your personal Enthiram is ready to be downloaded.
            </p>

            <!-- Countdown Ring -->
            <div class="countdown-wrapper">
                <div class="ring-container">
                    <svg width="90" height="90" viewBox="0 0 90 90">
                        <circle class="ring-bg" cx="45" cy="45" r="36"/>
                        <circle class="ring-progress" id="ring-progress" cx="45" cy="45" r="36"/>
                    </svg>
                    <span class="ring-number" id="ring-number">3</span>
                </div>
                <p class="countdown-label">Redirecting to your Enthiram...</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const numericId = urlParams.get('id');

        if (!numericId) window.location.href = '/';

        // ===== STAR CANVAS =====
        (function () {
            const canvas = document.getElementById('star-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            const stars = Array.from({ length: 150 }, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                r: Math.random() * 1.2 + 0.2, o: Math.random() * 0.5 + 0.1,
                sp: Math.random() * 0.01 + 0.003, ph: Math.random() * Math.PI * 2
            }));
            function draw(t) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${s.o * (0.6 + 0.4 * Math.sin(t * s.sp + s.ph))})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            requestAnimationFrame(draw);
            window.addEventListener('resize', resize);
        })();

        // ===== CELEBRATIONS =====
        function celebrate() {
            // Screen flash
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(16,185,129,0.25);z-index:2000;pointer-events:none;transition:opacity 0.6s ease-out;';
            document.body.appendChild(flash);
            setTimeout(() => { flash.style.opacity = '0'; setTimeout(() => flash.remove(), 600); }, 60);

            // Confetti multi-burst
            const defaults = { origin: { y: 0.6 }, zIndex: 1100 };
            const fire = (r, opts) => confetti({ ...defaults, ...opts, particleCount: Math.floor(200 * r) });
            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2,  { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1,  { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1,  { spread: 120, startVelocity: 45 });

            // Firework finale
            const endTime = Date.now() + 3500;
            const interval = setInterval(() => {
                const tl = endTime - Date.now();
                if (tl <= 0) return clearInterval(interval);
                const pc = 50 * (tl / 3500);
                confetti({ ...defaults, particleCount: pc, origin: { x: Math.random() * 0.4 + 0.1, y: Math.random() - 0.2 } });
                confetti({ ...defaults, particleCount: pc, origin: { x: Math.random() * 0.4 + 0.5, y: Math.random() - 0.2 } });
            }, 260);

            // Emoji burst
            const sc = 2;
            confetti({
                shapes: [
                    confetti.shapeFromText({ text: '🕉️', scalar: sc }),
                    confetti.shapeFromText({ text: '✨', scalar: sc }),
                    confetti.shapeFromText({ text: '🌸', scalar: sc }),
                    confetti.shapeFromText({ text: '🙏', scalar: sc })
                ],
                particleCount: 50, spread: 90, origin: { y: 0.5 }, scalar: sc
            });

            // Balloons
            const layer = document.getElementById('balloon-layer');
            const colors = ['#8a2be2', '#00f2fe', '#ffd700', '#ff0080', '#10b981', '#f59e0b'];
            for (let i = 0; i < 24; i++) {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'balloon';
                    b.style.cssText = `
                        bottom: -150px;
                        left: ${Math.random() * 100}vw;
                        width: ${30 + Math.random() * 20}px;
                        height: ${40 + Math.random() * 20}px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        animation: floatUp ${4 + Math.random() * 3}s linear forwards;
                        position: fixed;
                        border-radius: 50%;
                    `;
                    layer.appendChild(b);
                    setTimeout(() => b.remove(), 8000);
                }, i * 140);
            }
        }

        // ===== 3-SECOND COUNTDOWN THEN REDIRECT =====
        function startCountdown() {
            let count = 3;
            const numEl = document.getElementById('ring-number');
            const ring = document.getElementById('ring-progress');
            const circumference = 226;

            ring.style.strokeDashoffset = 0;

            const tick = setInterval(() => {
                count--;
                numEl.textContent = count;
                ring.style.strokeDashoffset = circumference * (1 - count / 3);
                if (count <= 0) {
                    clearInterval(tick);
                    window.location.href = `/download.html?id=${numericId}`;
                }
            }, 1000);
        }

        // Run on page load
        window.addEventListener('DOMContentLoaded', () => {
            // Short delay then start celebration + countdown
            setTimeout(() => {
                celebrate();
                startCountdown();
            }, 400);
        });
    </script>
</body>
</html>
